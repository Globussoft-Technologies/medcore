version: 2

# Dependabot config for MedCore.
# Ships PRs for outdated dependencies on a weekly cadence so the codebase
# never falls more than ~1 week behind known security patches.
#
# Behavior:
#   - npm: groups patch + minor updates so a single PR covers many small
#     bumps; major updates each get their own PR (review needed).
#   - github-actions: keeps actions/checkout, setup-node, etc. current.
#
# Scoping note: only the production-runtime npm deps are likely to surface
# CVE PRs that need urgent merging. Dev-only bumps (vitest, playwright,
# turbo) are useful but not security-critical.

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(actions)"
