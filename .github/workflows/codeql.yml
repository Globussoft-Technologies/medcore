name: CodeQL

# Static analysis for JS/TS code. Runs on:
#   - Every push to `main` (so a regression on main is caught within minutes
#     even if the PR review missed it)
#   - Every PR targeting `main`
#   - Weekly cron (so CVE rules added to GitHub's catalogue retroactively
#     surface against unchanged code)
#
# Findings appear under Security → Code scanning. CodeQL is free for public
# repos and free under GitHub Advanced Security for private repos on
# Enterprise plans; this repo's coverage status determines whether the
# Security tab populates.
#
# CI hardening Phase 1.5.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 06:30 IST every Monday, after the runner image refresh.
    - cron: "0 1 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # `javascript-typescript` covers both JS and TS in one pass; CodeQL
        # used to want them split, no longer required.
        language: ["javascript-typescript"]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-extended` enables additional rules (regex DoS, hard-
          # coded credentials patterns, etc.) at the cost of more false
          # positives. Worth it for a healthcare codebase.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
