name: Test

# Test + Deploy pipeline.
#
# - `test`, `web-tests`, `typecheck` run on every push and PR.
# - `deploy` runs ONLY on push to main, after the three gates pass, and SSHes
#   into the dev server to invoke scripts/deploy.sh --yes (the same script
#   we used to invoke manually). Auto-deploy is acceptable here because the
#   target is the dev/demo server, not a hospital production install.
# - Playwright E2E was removed on 2026-04-30 (commit 30ec764) — see TODO.md
#   "E2E hardening" for the conditions under which it'd be reintroduced.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY     — private key whose public counterpart is in
#                        ~/.ssh/authorized_keys on the dev server. Generate a
#                        new keypair specifically for CI; do not reuse a
#                        personal key.
#   DEPLOY_HOST        — IP or DNS of the dev server (e.g. 163.227.174.141).
#   DEPLOY_USER        — Linux user the deploy runs as (e.g. empcloud-development).
#   DEPLOY_KNOWN_HOSTS — output of `ssh-keyscan -H <host>` so the runner pins
#                        the host key (avoids TOFU + MITM).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: API tests (unit / contract / smoke / integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medcore
          POSTGRES_PASSWORD: medcore
          POSTGRES_DB: medcore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://medcore:medcore@localhost:5432/medcore_test
      DATABASE_URL_TEST: postgresql://medcore:medcore@localhost:5432/medcore_test
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push schema to test DB
        run: npx prisma db push --schema packages/db/prisma/schema.prisma --force-reset --skip-generate

      - name: Run unit + contract tests (with coverage)
        run: npm run test:coverage:unit

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run integration tests
        run: npm run test:api

      - name: Upload API coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-lcov
          path: coverage/
          retention-days: 14

  web-tests:
    name: Web component tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run web vitest suite (with coverage)
        run: npm run test:coverage:web

      - name: Upload web coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/
          retention-days: 14

  typecheck:
    name: Type check (api + web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type-check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Type-check Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  e2e-rbac:
    # Narrow Playwright job that runs ONLY the RBAC matrix spec —
    # 63 (role × route) cases proving every gated route bounces every
    # disallowed role. Started narrow so we can re-grow CI confidence
    # in Playwright after the full-suite removal in 30ec764. If it
    # holds green for a few pushes, broaden the `--grep` to the full
    # suite (and fix the /dashboard/admin-console a11y budget).
    #
    # Uses `next build && next start` deliberately — `next dev`
    # cold-start was the source of every flake that caused the suite
    # to be removed in the first place. A warm-served bundle compiles
    # once during the build step and tests then hit a fixed binary.
    name: E2E (RBAC matrix only)
    runs-on: ubuntu-latest
    needs: typecheck

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medcore
          POSTGRES_PASSWORD: medcore
          POSTGRES_DB: medcore_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://medcore:medcore@localhost:5432/medcore_e2e
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      NODE_ENV: production
      # NOTE: do NOT set PORT at the job level — it leaks into both the
      # `Start API` and `Start Web` steps, causing them to fight over the
      # same port (next start respects $PORT just like Express does, so a
      # job-level PORT=4000 made next bind 4000 first and then the API died
      # with EADDRINUSE). PORT is set inline per-process below.
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:4000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `--include=dev` is mandatory in this job because the job-level env
        # sets NODE_ENV=production (so `next start` boots in production mode
        # later). Under NODE_ENV=production, npm install skips devDependencies
        # by default, which left `turbo` (devDep, drives `npm run db:generate`)
        # uninstalled and the very next step blew up with `sh: 1: turbo: not
        # found`. Forcing dev installs here keeps build/test tooling on PATH
        # without changing the runtime env the API and Web processes inherit.
        run: npm install --include=dev

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push schema and seed
        run: |
          npx prisma db push --schema packages/db/prisma/schema.prisma --force-reset --skip-generate
          npm run db:seed

      - name: Build Web (warm bundle)
        run: npm --prefix apps/web run build

      - name: Start API
        env:
          PORT: "4000"
        run: |
          cd apps/api
          nohup npm run dev > ../../api.log 2>&1 &
          cd ../..

      - name: Start Web (next start)
        env:
          PORT: "3000"
        run: |
          cd apps/web
          nohup npm start > ../../web.log 2>&1 &
          cd ../..

      - name: Wait for API and Web
        # next start serves the pre-built bundle; the only wait here is
        # the Node bootstrap + db connection, not the JIT compile that
        # used to dominate `next dev` cold-start.
        run: |
          npx wait-on http://localhost:4000/api/health http://localhost:3000/login --timeout 90000

      - name: Run Playwright RBAC matrix
        run: npx playwright test e2e/rbac-matrix.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-rbac-report
          path: playwright-report
          retention-days: 14

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-rbac
          path: |
            api.log
            web.log
          retention-days: 7

  deploy:
    name: Deploy to dev server
    runs-on: ubuntu-latest
    # Gate on:
    #   - test          (API: unit + contract + smoke + integration)
    #   - web-tests     (vitest UI components)
    #   - typecheck     (api + web tsc --noEmit)
    #   - e2e-rbac      (NEW — Playwright RBAC matrix on a `next start`
    #                    bundle. Narrow scope (just rbac-matrix.spec.ts)
    #                    while we re-establish trust in the e2e step
    #                    after the 30ec764 removal. Once it holds green
    #                    for a few pushes, broaden the spec list and
    #                    address the /dashboard/admin-console a11y
    #                    budget so the full suite can re-enter the gate.)
    #
    # 2026-05-01: matrix reconciled (seed for LAB_TECH/PHARMACIST in
    # f7514fc, ai-route 400-shape alignment in 73bfb32, dashboard-prefix
    # match in fbf1145). Latest main run green across all 5 jobs —
    # re-adding e2e-rbac to the gate.
    needs: [test, web-tests, typecheck, e2e-rbac]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Don't cancel a deploy that's already in progress — let it finish, then
    # the next one runs. Two deploys racing on the same host can corrupt
    # node_modules during `npm ci` or leave pm2 in a half-restarted state.
    concurrency:
      group: deploy-medcore-dev
      cancel-in-progress: false

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Pin known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run scripts/deploy.sh on the dev server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        # `bash -lc` loads the user's profile so NVM is on PATH (the deploy
        # script itself sources NVM, but `npm`/`node` need to be reachable
        # before the script even starts).
        #
        # We invoke the script with an explicit `bash <path>` rather than
        # `<path>` so the file's executable bit is irrelevant — git on
        # Windows commits .sh files as 100644 by default, and a fresh clone
        # of the dev server would otherwise hit "Permission denied" (exit 126).
        #
        # We also pre-clean a stale `package-lock.json` before invoking the
        # script. Background: npm/cli#4828 occasionally leaves the lock file
        # dirty after `npm ci` resolves @tailwindcss/oxide's optional deps.
        # The script's step-0 working-tree-clean check then aborts before
        # it can `git pull` the in-tree workaround. Doing the cleanup here
        # at the workflow level breaks the chicken-and-egg loop and matches
        # the proven pattern from the original manual-deploy command.
        #
        # The script handles git pull, npm ci, prisma generate + migrate
        # deploy, web build, pm2 restart, and a curl-based health check.
        run: |
          ssh -o BatchMode=yes -o ServerAliveInterval=30 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -lc "cd /home/empcloud-development/medcore && git checkout -- package-lock.json 2>/dev/null; bash scripts/deploy.sh --yes"'

      - name: Smoke-check public endpoints
        if: success()
        # deploy.sh already curls localhost:4100 + localhost:3200 on the box.
        # This is a *public* check — confirms nginx is forwarding correctly
        # and nothing on the proxy side broke during the restart.
        #
        # Status-only checks (curl -fsS) miss the case where a proxy default
        # page or nginx maintenance page returns 200. We validate response
        # *content* on both targets so a genuinely-broken deploy fails here
        # rather than waiting for a user to hit it.
        run: |
          set -euo pipefail
          BASE="https://medcore.globusdemos.com"

          # API health: JSON shape check ensures Express is up and routing,
          # not just that nginx is serving something.
          health=$(curl -fsS --max-time 10 "${BASE}/api/health")
          echo "${health}" | jq -e '.status == "ok"' > /dev/null \
            || { echo "FAILED /api/health — bad shape: ${health}"; exit 1; }
          echo "OK /api/health"

          # Web /login: stable across releases; the "MedCore" marker is in
          # <title> and several visible elements. Confirms the Next.js bundle
          # rendered, not just that the server responded.
          body=$(curl -fsS --max-time 10 "${BASE}/login")
          echo "${body}" | grep -q "MedCore" \
            || { echo "FAILED /login — body missing MedCore marker"; exit 1; }
          echo "OK /login"
