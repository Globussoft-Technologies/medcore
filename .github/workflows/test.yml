name: Test

# Test + Deploy pipeline.
#
# - `test`, `web-tests`, `typecheck` run on every push and PR.
# - `deploy` runs ONLY on push to main, after the three gates pass, and SSHes
#   into the dev server to invoke scripts/deploy.sh --yes (the same script
#   we used to invoke manually). Auto-deploy is acceptable here because the
#   target is the dev/demo server, not a hospital production install.
# - Playwright E2E was removed on 2026-04-30 (commit 30ec764) — see TODO.md
#   "E2E hardening" for the conditions under which it'd be reintroduced.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY     — private key whose public counterpart is in
#                        ~/.ssh/authorized_keys on the dev server. Generate a
#                        new keypair specifically for CI; do not reuse a
#                        personal key.
#   DEPLOY_HOST        — IP or DNS of the dev server (e.g. 163.227.174.141).
#   DEPLOY_USER        — Linux user the deploy runs as (e.g. empcloud-development).
#   DEPLOY_KNOWN_HOSTS — output of `ssh-keyscan -H <host>` so the runner pins
#                        the host key (avoids TOFU + MITM).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: API tests (unit / contract / smoke / integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medcore
          POSTGRES_PASSWORD: medcore
          POSTGRES_DB: medcore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://medcore:medcore@localhost:5432/medcore_test
      DATABASE_URL_TEST: postgresql://medcore:medcore@localhost:5432/medcore_test
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push schema to test DB
        run: npx prisma db push --schema packages/db/prisma/schema.prisma --force-reset --skip-generate

      - name: Run unit + contract tests (with coverage)
        run: npm run test:coverage:unit

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run integration tests
        run: npm run test:api

      - name: Upload API coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-lcov
          path: coverage/
          retention-days: 14

  web-tests:
    name: Web component tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run web vitest suite (with coverage)
        run: npm run test:coverage:web

      - name: Upload web coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/
          retention-days: 14

  typecheck:
    name: Type check (api + web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type-check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Type-check Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  lint:
    # ESLint via `next lint` on apps/web. Not in `deploy.needs` initially
    # (CI hardening Phase 1.1) — first runs surface existing violations
    # for triage, after which we flip this into the deploy gate. The api +
    # shared workspaces' "lint" scripts alias to `tsc --noEmit` and are
    # already covered by the typecheck job; only the web eslint pass is
    # genuinely new signal here.
    name: Lint (web eslint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        # Web pages import shared types whose generation triggers Prisma
        # client generation. Without this step `next lint` errors on
        # missing `@prisma/client` types.
        run: npm run db:generate

      - name: ESLint web
        run: npm --prefix apps/web run lint

  npm-audit:
    # Surface known CVEs in dependencies. Fails on high/critical only —
    # moderate/low are noisy and frequently can't be fixed without major
    # version bumps that need product decisions. Healthcare codebase makes
    # this table-stakes (CI hardening Phase 1.3).
    name: npm audit (high+critical)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run npm audit
        # `--omit=dev` skips devDeps so we only fail on prod-runtime CVEs.
        # Tooling vulnerabilities (test runners etc.) get caught by the
        # weekly Dependabot/CodeQL passes instead.
        run: npm audit --audit-level=high --omit=dev

  web-bundle:
    # Builds apps/web and prints the size of the static chunks directory
    # on every push, so the workflow log is a longitudinal record of
    # bundle weight. Fails only on catastrophic bloat (>25 MB of JS) to
    # avoid noisy failures while we collect baseline numbers; tighten the
    # budget in a follow-up commit once a few clean runs settle on a
    # realistic size.
    # CI hardening Phase 2.4.
    name: Web bundle size
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        # next build imports types whose generation triggers prisma generate.
        run: npm run db:generate

      - name: Build web
        run: npm --prefix apps/web run build

      - name: Report and budget-check bundle size
        run: |
          set -euo pipefail
          CHUNKS_DIR="apps/web/.next/static/chunks"
          if [ ! -d "$CHUNKS_DIR" ]; then
            echo "::error::$CHUNKS_DIR missing — next build did not produce static chunks."
            exit 1
          fi

          BYTES=$(du -sb "$CHUNKS_DIR" | cut -f1)
          MB=$(awk -v b="$BYTES" 'BEGIN { printf "%.2f", b/1024/1024 }')
          echo "Static chunks: ${MB} MB (${BYTES} bytes)"
          echo

          # Per-chunk top-10 for triage when bloat appears.
          echo "Top 10 chunks by size:"
          du -h "$CHUNKS_DIR"/*.js 2>/dev/null | sort -hr | head -10 || true
          echo

          # Catastrophic-bloat budget: 25 MB. A typical Next.js app of
          # this scope sits at 3-8 MB; 25 MB means a vendor bundle slipped
          # in or a code-split boundary collapsed. Tighten this number
          # once we have ~5 clean baseline runs.
          BUDGET_MB=25
          if awk -v m="$MB" -v b="$BUDGET_MB" 'BEGIN { exit !(m > b) }'; then
            echo "::error::Bundle exceeded ${BUDGET_MB} MB budget (${MB} MB). Investigate top chunks above."
            exit 1
          fi
          echo "::notice::Bundle ${MB} MB is under the ${BUDGET_MB} MB tripwire budget."

  migration-safety:
    # Scan new/modified Prisma migrations for destructive ops and fail the
    # build unless the commit message explicitly opts in. Since this repo
    # pushes direct to main (no mandatory PR review for code changes), the
    # forcing function lives on the commit itself: a destructive migration
    # MUST be paired with `[allow-destructive-migration]` in its message
    # so reviewing the commit log later is enough to spot data-loss risk.
    # CI hardening Phase 2.3.
    name: Migration safety
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need at least the previous commit to diff against. fetch-depth=0
          # is overkill but cheap; lets us scan the full PR diff if/when we
          # add PR triggers later.
          fetch-depth: 0

      - name: Scan added/modified migrations for destructive ops
        env:
          # `before` is the parent SHA on a push event. On a PR event GHA
          # exposes pull_request.base.sha; we don't run on PRs today but
          # leaving the fallback in keeps this future-proof.
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE="${PR_BASE_SHA:-$BEFORE_SHA}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            # First push to a branch — diff against main's first parent.
            BASE="$(git rev-list --max-parents=0 HEAD | tail -1)"
          fi
          echo "Diffing $BASE..$HEAD_SHA for migration changes"

          CHANGED=$(git diff --name-only --diff-filter=AM "$BASE..$HEAD_SHA" -- 'packages/db/prisma/migrations/**/migration.sql' || true)
          if [ -z "$CHANGED" ]; then
            echo "No migration changes in this push — pass."
            exit 0
          fi

          echo "Migration files added/modified:"
          echo "$CHANGED"
          echo

          DESTRUCTIVE=0
          DESTRUCTIVE_LOG=""
          # Patterns that destroy data. ALTER TYPE is included because
          # narrowing types (text → varchar(20), int → smallint) silently
          # truncates. We err on the side of false positives — call out
          # additive ALTER TYPEs explicitly with the opt-in marker.
          PATTERNS='DROP\s+TABLE|DROP\s+COLUMN|TRUNCATE|ALTER\s+TABLE\s+\S+\s+ALTER\s+COLUMN\s+\S+\s+TYPE|DROP\s+INDEX'
          for f in $CHANGED; do
            if grep -iEn "$PATTERNS" "$f" > /dev/null; then
              DESTRUCTIVE=1
              DESTRUCTIVE_LOG="${DESTRUCTIVE_LOG}\n--- $f ---\n$(grep -iEn "$PATTERNS" "$f")"
            fi
          done

          if [ "$DESTRUCTIVE" -eq 0 ]; then
            echo "Migration changes are additive — pass."
            exit 0
          fi

          echo "Destructive ops found:"
          printf "%b\n" "$DESTRUCTIVE_LOG"
          echo

          # Check the commit message for the opt-in marker. We look at the
          # full range so a multi-commit push works too (any commit in the
          # range can carry the marker).
          MSGS="$(git log --format=%B "$BASE..$HEAD_SHA")"
          if echo "$MSGS" | grep -qF '[allow-destructive-migration]'; then
            echo "::notice::Destructive migration explicitly allowed via commit message marker."
            exit 0
          fi

          echo "::error::Destructive migration without [allow-destructive-migration] marker."
          echo "Add the marker to a commit message in this push (any line) if this is intentional."
          echo "Otherwise, rewrite the migration to be additive — see DEPLOY.md 'Recovery from a bad migration'."
          exit 1

  deploy:
    name: Deploy to dev server
    runs-on: ubuntu-latest
    # Gate on:
    #   - test          (API: unit + contract + smoke + integration)
    #   - web-tests     (vitest UI components)
    #   - typecheck     (api + web tsc --noEmit)
    #
    # E2E (Playwright) is intentionally NOT in the per-push gate. The
    # full suite runs only on the manual `release.yml` workflow, which
    # is the release-validation gate. Per-push CI stays fast (~7 min)
    # and auto-deploys to the dev server on every green main push;
    # release-validation is the heavier "are we good to declare a
    # release" check the user triggers on demand.
    needs: [test, web-tests, typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Don't cancel a deploy that's already in progress — let it finish, then
    # the next one runs. Two deploys racing on the same host can corrupt
    # node_modules during `npm ci` or leave pm2 in a half-restarted state.
    concurrency:
      group: deploy-medcore-dev
      cancel-in-progress: false

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Pin known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run scripts/deploy.sh on the dev server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        # `bash -lc` loads the user's profile so NVM is on PATH (the deploy
        # script itself sources NVM, but `npm`/`node` need to be reachable
        # before the script even starts).
        #
        # We invoke the script with an explicit `bash <path>` rather than
        # `<path>` so the file's executable bit is irrelevant — git on
        # Windows commits .sh files as 100644 by default, and a fresh clone
        # of the dev server would otherwise hit "Permission denied" (exit 126).
        #
        # We also pre-clean a stale `package-lock.json` before invoking the
        # script. Background: npm/cli#4828 occasionally leaves the lock file
        # dirty after `npm ci` resolves @tailwindcss/oxide's optional deps.
        # The script's step-0 working-tree-clean check then aborts before
        # it can `git pull` the in-tree workaround. Doing the cleanup here
        # at the workflow level breaks the chicken-and-egg loop and matches
        # the proven pattern from the original manual-deploy command.
        #
        # The script handles git pull, npm ci, prisma generate + migrate
        # deploy, web build, pm2 restart, and a curl-based health check.
        run: |
          ssh -o BatchMode=yes -o ServerAliveInterval=30 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -lc "cd /home/empcloud-development/medcore && git checkout -- package-lock.json 2>/dev/null; bash scripts/deploy.sh --yes"'

      - name: Smoke-check public endpoints
        id: smoke
        if: success()
        # deploy.sh already curls localhost:4100 + localhost:3200 on the box.
        # This is a *public* check — confirms nginx is forwarding correctly
        # and nothing on the proxy side broke during the restart.
        #
        # Status-only checks (curl -fsS) miss the case where a proxy default
        # page or nginx maintenance page returns 200. We validate response
        # *content* on both targets so a genuinely-broken deploy fails here
        # rather than waiting for a user to hit it.
        run: |
          set -euo pipefail
          BASE="https://medcore.globusdemos.com"

          # API health: JSON shape check ensures Express is up and routing,
          # not just that nginx is serving something.
          health=$(curl -fsS --max-time 10 "${BASE}/api/health")
          echo "${health}" | jq -e '.status == "ok"' > /dev/null \
            || { echo "FAILED /api/health — bad shape: ${health}"; exit 1; }
          echo "OK /api/health"

          # Web /login: stable across releases; the "MedCore" marker is in
          # <title> and several visible elements. Confirms the Next.js bundle
          # rendered, not just that the server responded.
          body=$(curl -fsS --max-time 10 "${BASE}/login")
          echo "${body}" | grep -q "MedCore" \
            || { echo "FAILED /login — body missing MedCore marker"; exit 1; }
          echo "OK /login"

      - name: Auto-rollback on smoke failure
        # Triggered only when the smoke step above failed (the deploy step
        # itself succeeded — if SSH failed, there's nothing on the server
        # to roll back). SSHes back to the dev box and runs deploy.sh
        # --rollback, which resets the checkout to PREV_SHA (saved at
        # /tmp/medcore-prev-sha by the just-completed deploy), reinstalls
        # at that SHA, and restarts pm2. Schema migrations are NOT rolled
        # back — see DEPLOY.md "Recovery from a bad migration" if a
        # destructive migration is the actual culprit.
        # CI hardening Phase 2.2.
        if: failure() && steps.smoke.conclusion == 'failure'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "::warning::Smoke check failed; rolling back the dev server to PREV_SHA"
          ssh -o BatchMode=yes -o ServerAliveInterval=30 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -lc "cd /home/empcloud-development/medcore && bash scripts/deploy.sh --rollback"'

      - name: Re-smoke after rollback
        # If the rollback step ran and (presumably) succeeded, re-check the
        # public endpoints to confirm the previous SHA is actually serving
        # traffic. If THIS step fails, page a human — the rollback didn't
        # bring the system back to a good state and DEPLOY.md's manual
        # recovery flow is needed.
        if: failure() && steps.smoke.conclusion == 'failure'
        run: |
          set -euo pipefail
          BASE="https://medcore.globusdemos.com"
          health=$(curl -fsS --max-time 10 "${BASE}/api/health")
          echo "${health}" | jq -e '.status == "ok"' > /dev/null \
            || { echo "::error::Rollback DID NOT RESTORE service. Manual recovery required."; exit 1; }
          echo "::notice::Rollback restored /api/health. Investigate the failed deploy on a branch."
