name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: API tests (unit / contract / smoke / integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medcore
          POSTGRES_PASSWORD: medcore
          POSTGRES_DB: medcore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://medcore:medcore@localhost:5432/medcore_test
      DATABASE_URL_TEST: postgresql://medcore:medcore@localhost:5432/medcore_test
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push schema to test DB
        run: npx prisma db push --schema packages/db/prisma/schema.prisma --force-reset --skip-generate

      - name: Run unit + contract tests (with coverage)
        run: npm run test:coverage:unit

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run integration tests
        run: npm run test:api

      - name: Upload API coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-lcov
          path: coverage/
          retention-days: 14

  web-tests:
    name: Web component tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run web vitest suite (with coverage)
        run: npm run test:coverage:web

      - name: Upload web coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/
          retention-days: 14

  typecheck:
    name: Type check (api + web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type-check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Type-check Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medcore
          POSTGRES_PASSWORD: medcore
          POSTGRES_DB: medcore_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://medcore:medcore@localhost:5432/medcore_e2e
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      NODE_ENV: development
      PORT: "4000"
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:4000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push schema and seed
        run: |
          npx prisma db push --schema packages/db/prisma/schema.prisma --force-reset --skip-generate
          npm run db:seed

      - name: Start API
        run: |
          cd apps/api
          nohup npm run dev > ../../api.log 2>&1 &
          cd ../..

      - name: Start Web
        run: |
          cd apps/web
          nohup npm run dev > ../../web.log 2>&1 &
          cd ../..

      - name: Wait for API and Web
        run: |
          npx wait-on http://localhost:4000/api/health http://localhost:3000/login --timeout 120000

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            api.log
            web.log
          retention-days: 7
